  <rect x="228" y="80" width="38" height="164" rx="3" fill="rgba(255,255,255,0.83)"/>
  <rect x="228" y="80" width="12" height="164" rx="2" fill="rgba(255,160,20,0.28)"/>
  <line x1="245" y1="108" x2="259" y2="108" stroke="rgba(120,60,0,0.15)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="245" y1="119" x2="259" y2="119" stroke="rgba(120,60,0,0.15)" stroke-width="1.5" stroke-linecap="round"/>

