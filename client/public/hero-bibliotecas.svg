  <rect x="273" y="100" width="13" height="144" rx="2" fill="rgba(230,110,5,0.26)"/>
  <line x1="291" y1="126" x2="308" y2="126" stroke="rgba(120,60,0,0.17)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="291" y1="137" x2="308" y2="137" stroke="rgba(120,60,0,0.17)" stroke-width="1.5" stroke-linecap="round"/>
